global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['config-server:8888']

  - job_name: 'discovery-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['discovery-service:8761']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8997']

  - job_name: 'plc-command-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['plc-command-service:8998']

  - job_name: 'telemetry-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['telemetry-service:8999']